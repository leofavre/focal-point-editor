# Vike SSR on Netlify: client assets in dist/client, server runs as a Netlify Function.
# See https://vike.dev/netlify-functions
[build]
  command = "yarn build"
  publish = "dist/client"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "24"

# SSR is handled by netlify/functions/server.mjs via config.path = "/*" and preferStatic.
# No redirect needed; the function runs for non-static paths and receives the original URL.
