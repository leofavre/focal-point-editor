# Vike SSR on Netlify: client assets in dist/client, server runs as a Netlify Function.
# See https://vike.dev/netlify-functions
[build]
  command = "yarn build"
  publish = "dist/client"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "24"

# SSR: requests that don't match a static file go to the server function.
# Static files (JS, CSS, images) are served from dist/client first.
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
