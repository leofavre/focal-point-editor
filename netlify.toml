# Vike SSR on Netlify: client assets in dist/client, server runs as a Netlify Function.
# See https://vike.dev/netlify-functions
[build]
  command = "yarn build"
  publish = "dist/client"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "24"

# Include the Vike server build so the function can load it at runtime (not imported statically).
[functions]
  included_files = ["dist/server/**"]

# Rewrite non-static requests to the function; pass path as query so the function gets the original URL.
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server?path=:splat"
  status = 200
